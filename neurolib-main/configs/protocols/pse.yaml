# PSE Protocol specific configuration
# These values override the defaults for the PSE protocol

# Artifact threshold for noise reduction
artefact_thresh: 8.0

# Mask window for stimulation artifacts
mask_window_ms: 3.0

# Auto-correlation parameters
auto_correlation_bin_size_ms: 1

# Cross-correlation parameters
cross_correlation_bin_size_ms: 10

# UMAP embedding parameters
umap_n_components: 3
umap_bin_size_ms: 10
umap_random_state: 42

# PCA embedding parameters
pca_n_components: 3
pca_bin_size_ms: 10
pca_random_state: 42